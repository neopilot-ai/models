name: Deploy to GitHub Pages (Rust Runtime)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust web server
        run: cargo build --release --bin neopilot-models

      - name: Generate static site
        run: |
          # Create dist directory
          mkdir -p dist
          
          # Generate API JSON
          ./target/release/neopilot-models export --output dist/api.json --pretty
          
          # Generate model schema
          ./target/release/neopilot-models schema --output dist/model-schema.json
          
          # Copy provider logos
          mkdir -p dist/logos
          cp providers/logo.svg dist/logos/default.svg 2>/dev/null || true
          find providers -name "logo.svg" -exec cp {} dist/logos/{} \; 2>/dev/null || true
          
          # Copy HTML template
          cp .github/workflows/index-template.html dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
